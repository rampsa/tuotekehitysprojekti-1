<!doctype html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FixIT Mobile tyyliohje</title>
    <link rel="stylesheet" href="styleguide.css" />
  </head>
  <body>
    <div class="container">
      <h1>FixIT Mobile tyyliohje</h1>
      <section>
        <h2>Väripaletti</h2>
        <div class="paletti">
          <div class="paletti-kortti">
            <div class="slate"></div>
            <div class="paletti-info">
              <p><b>Slate</b></p>
              <small>#222831</small>
              <p class="text-caption">Teksti, otsikot</p>
            </div>
          </div>
          <div class="paletti-kortti">
            <div class="graphite"></div>
            <div class="paletti-info">
              <p><b>Graphite</b></p>
              <small>#393E46</small>
              <p class="text-caption">Toissijainen teksti</p>
            </div>
          </div>
          <div class="paletti-kortti">
            <div class="teal"></div>
            <div class="paletti-info">
              <p><b>Teal</b></p>
              <small>#00ADB5</small>
              <p class="text-caption">Tehosteväri</p>
            </div>
          </div>
          <div class="paletti-kortti">
            <div class="fog"></div>
            <div class="paletti-info">
              <p><b>Fog</b></p>
              <small>#EEEEEE</small>
              <p class="text-caption">Tausta, pinnat</p>
            </div>
          </div>
        </div>
      </section>
    </div>
  </body>
</html>
